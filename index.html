<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Dancing Script', cursive;
        }

       
        .container {
            position: relative;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 5rem;
            color: #fff;
            text-shadow: 0 0 20px #f1ecec, 0 0 30px #fdfbfb;
            margin: 0;
            animation: float 3s ease-in-out infinite;
        }

        .te-amo {
            position: absolute;
            right: -60px;
            bottom: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.1rem;
            color: rgba(240, 235, 235, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

       
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

     
        .shooting-star {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 0 8px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,1);
            animation: shoot 3s linear infinite;
            opacity: 0;
        }

        .shooting-star::before {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            height: 1px;
            background: linear-gradient(90deg, #fff, transparent);
        }

        @keyframes shoot {
            0% { transform: rotate(315deg) translateX(0); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: rotate(315deg) translateX(-1000px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Andrea Sangabriel</h1>
        <span class="te-amo">te amo</span>
    </div>

    <script>
        function initUniverse() {
            
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${2 + Math.random() * 3}s`);
                document.body.appendChild(star);
            }


            setInterval(() => {
                const shootingStar = document.createElement('div');
                shootingStar.className = 'shooting-star';
                shootingStar.style.top = `${Math.random() * 50}%`;
                shootingStar.style.left = `${Math.random() * 100}%`;
                shootingStar.style.animationDuration = `${1.5 + Math.random() * 2}s`;
                document.body.appendChild(shootingStar);
                
                setTimeout(() => shootingStar.remove(), 3000);
            }, 2000);
        }

        initUniverse();
    </script>
</body>
</html>
